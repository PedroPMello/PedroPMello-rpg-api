openapi: 3.0.3
info:
  title: D&D 5e Character Sheet API
  description: |
    API RESTful para gerenciamento de fichas de personagens de Dungeons & Dragons 5ª Edição.
    
    ## Autenticação
    A maioria das rotas exige autenticação JWT. Para autenticar:
    1. Crie uma conta com `POST /auth/register`
    2. Faça login com `POST /auth/login` para obter o token
    3. Inclua o token no header: `Authorization: Bearer <token>`
    
    ## Recursos
    - **Auth** — Registro, login e perfil do usuário
    - **Characters** — CRUD completo de personagens D&D com cálculos automáticos
  version: 1.0.0
  contact:
    name: Serviços Web — IFSul Passo Fundo

servers:
  - url: http://localhost:3000
    description: Servidor de desenvolvimento

tags:
  - name: Auth
    description: Autenticação e gerenciamento de conta
  - name: Characters
    description: Personagens D&D 5e (todas as rotas exigem JWT)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Aragorn Dunadan
        email:
          type: string
          example: aragorn@lotr.com
        createdAt:
          type: string
          format: date-time

    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: Aragorn Dunadan
        email:
          type: string
          example: aragorn@lotr.com
        password:
          type: string
          minLength: 6
          example: senha123

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          example: aragorn@lotr.com
        password:
          type: string
          example: senha123

    AuthResponse:
      type: object
      properties:
        message:
          type: string
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
          description: JWT válido por 7 dias
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    CharacterSummary:
      type: object
      description: Visão resumida usada na listagem
      properties:
        id:
          type: integer
        name:
          type: string
        race:
          type: string
        class:
          type: string
        subclass:
          type: string
          nullable: true
        level:
          type: integer
        currentHitPoints:
          type: integer
        maxHitPoints:
          type: integer
        armorClass:
          type: integer
        updatedAt:
          type: string
          format: date-time

    Character:
      type: object
      description: Ficha completa com campos calculados
      properties:
        id:
          type: integer
          example: 1
        userId:
          type: integer
          example: 1
        name:
          type: string
          example: Strider
        race:
          type: string
          example: Human
          enum: [Human, Elf, Dwarf, Halfling, Gnome, Half-Elf, Half-Orc, Tiefling, Dragonborn]
        class:
          type: string
          example: Ranger
          enum: [Barbarian, Bard, Cleric, Druid, Fighter, Monk, Paladin, Ranger, Rogue, Sorcerer, Warlock, Wizard, Artificer]
        subclass:
          type: string
          nullable: true
          example: Hunter
        background:
          type: string
          nullable: true
          example: Outlander
        alignment:
          type: string
          nullable: true
          example: Lawful Good
        level:
          type: integer
          minimum: 1
          maximum: 20
          example: 10
        experiencePoints:
          type: integer
          example: 64000
        strength:
          type: integer
          minimum: 1
          maximum: 30
          example: 18
        dexterity:
          type: integer
          example: 16
        constitution:
          type: integer
          example: 14
        intelligence:
          type: integer
          example: 12
        wisdom:
          type: integer
          example: 14
        charisma:
          type: integer
          example: 13
        maxHitPoints:
          type: integer
          example: 94
        currentHitPoints:
          type: integer
          example: 94
        temporaryHitPoints:
          type: integer
          example: 0
        armorClass:
          type: integer
          example: 16
        speed:
          type: integer
          example: 30
        initiative:
          type: integer
          example: 3
        proficiencyBonus:
          type: integer
          example: 4
        inspiration:
          type: boolean
          example: false
        backstory:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        computed:
          type: object
          description: Campos calculados automaticamente pela API
          properties:
            strengthModifier:
              type: integer
              example: 4
            dexterityModifier:
              type: integer
              example: 3
            constitutionModifier:
              type: integer
              example: 2
            intelligenceModifier:
              type: integer
              example: 1
            wisdomModifier:
              type: integer
              example: 2
            charismaModifier:
              type: integer
              example: 1
            proficiencyBonus:
              type: integer
              example: 4
            passivePerception:
              type: integer
              example: 12
            isAlive:
              type: boolean
              example: true

    CharacterInput:
      type: object
      required: [name, race, class]
      properties:
        name:
          type: string
          example: Strider
        race:
          type: string
          enum: [Human, Elf, Dwarf, Halfling, Gnome, Half-Elf, Half-Orc, Tiefling, Dragonborn]
          example: Human
        class:
          type: string
          enum: [Barbarian, Bard, Cleric, Druid, Fighter, Monk, Paladin, Ranger, Rogue, Sorcerer, Warlock, Wizard, Artificer]
          example: Ranger
        subclass:
          type: string
          example: Hunter
        background:
          type: string
          example: Outlander
        alignment:
          type: string
          example: Lawful Good
        level:
          type: integer
          minimum: 1
          maximum: 20
          example: 1
        experiencePoints:
          type: integer
          example: 0
        strength:
          type: integer
          minimum: 1
          maximum: 30
          example: 16
        dexterity:
          type: integer
          example: 14
        constitution:
          type: integer
          example: 14
        intelligence:
          type: integer
          example: 10
        wisdom:
          type: integer
          example: 12
        charisma:
          type: integer
          example: 10
        maxHitPoints:
          type: integer
          example: 11
        currentHitPoints:
          type: integer
          example: 11
        armorClass:
          type: integer
          example: 13
        speed:
          type: integer
          example: 30
        backstory:
          type: string
        notes:
          type: string

    Error:
      type: object
      properties:
        error:
          type: string
          example: Mensagem de erro

paths:
  /health:
    get:
      summary: Health check
      tags: [Auth]
      responses:
        '200':
          description: API online
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string

  /auth/register:
    post:
      summary: Criar conta de usuário
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        '201':
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: E-mail já cadastrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      summary: Login e obtenção do token JWT
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Login realizado, token retornado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/me:
    get:
      summary: Dados do usuário autenticado
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dados do usuário
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /characters/options:
    get:
      summary: Lista raças, classes e alinhamentos válidos
      description: Retorna as opções disponíveis para criação de personagem. Útil para popular selects no frontend.
      tags: [Characters]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Opções disponíveis
          content:
            application/json:
              schema:
                type: object
                properties:
                  races:
                    type: array
                    items:
                      type: string
                  classes:
                    type: array
                    items:
                      type: string
                  alignments:
                    type: array
                    items:
                      type: string

  /characters:
    get:
      summary: Listar personagens do usuário
      tags: [Characters]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de personagens (visão resumida)
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  characters:
                    type: array
                    items:
                      $ref: '#/components/schemas/CharacterSummary'
        '401':
          description: Não autenticado

    post:
      summary: Criar novo personagem
      tags: [Characters]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CharacterInput'
      responses:
        '201':
          description: Personagem criado com campos calculados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Character'
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Não autenticado

  /characters/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
        description: ID do personagem

    get:
      summary: Obter personagem por ID
      description: Retorna a ficha completa com todos os campos calculados (modificadores, percepção passiva, etc.)
      tags: [Characters]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Ficha completa do personagem
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Character'
        '403':
          description: Sem permissão (personagem de outro usuário)
        '404':
          description: Personagem não encontrado

    put:
      summary: Atualizar personagem (substituição completa)
      tags: [Characters]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CharacterInput'
      responses:
        '200':
          description: Personagem atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Character'
        '400':
          description: Dados inválidos
        '403':
          description: Sem permissão
        '404':
          description: Não encontrado

    patch:
      summary: Atualizar personagem parcialmente
      description: Ideal para atualizações durante combate (ex. alterar apenas currentHitPoints)
      tags: [Characters]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Qualquer subconjunto dos campos do personagem
              example:
                currentHitPoints: 45
                temporaryHitPoints: 10
                inspiration: true
      responses:
        '200':
          description: Personagem atualizado parcialmente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Character'
        '400':
          description: Dados inválidos
        '403':
          description: Sem permissão
        '404':
          description: Não encontrado

    delete:
      summary: Excluir personagem
      tags: [Characters]
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Personagem excluído com sucesso (sem corpo)
        '403':
          description: Sem permissão
        '404':
          description: Não encontrado
